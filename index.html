<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f4f4f9; 
            margin: 0;
            padding: 20px;
        }

        .container { 
            width: 90%; 
            max-width: 650px; 
            margin-top: 20px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center;
        }

        .controls {
            margin-top: 60px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .view-btn { background-color: #e0e0e0; color: #333; }
        .view-btn:hover { background-color: #d0d0d0; }

        input[type="date"] {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        
        #refresh-btn {
            margin-top: 20px;
            background-color: #36A2EB;
            color: white;
            width: 100%;
        }
        #refresh-btn:hover { background-color: #2980b9; }

        .header-group {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 30px;
        }

        h1 { color: #333; margin: 0; font-size: 1.5rem; }
        
        #total-time-display {
            font-size: 1.1rem;
            color: #666;
            font-weight: 400;
            background: #eee;
            padding: 4px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }

        /* Status Indicator Styling */
        #status-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 13px;
            font-weight: 600;
        }

        #status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            margin-right: 10px;
            transition: background-color 0.3s ease;
        }

        .online { background-color: #4CAF50 !important; }
        .offline { background-color: #f44336 !important; }

        #no-data-msg {
            color: #999;
            font-style: italic;
            margin: 50px 0;
            display: none;
        }

        canvas { max-width: 100%; height: auto !important; }
    </style>
</head>
<body>
    
    <div id="status-container">
        <div id="status-dot"></div>
        <span id="status-text">Connecting...</span>
    </div>

    <div class="controls">
        <button class="view-btn" onclick="loadChart('today')">Today</button>
        <button class="view-btn" onclick="loadChart('all')">All-Time</button>
        <input type="date" id="date-picker" onchange="loadDateFromPicker()">
    </div>

    <div class="container">
        <div class="header-group">
            <h1 id="chart-title">Today's Activity</h1>
            <span id="total-time-display">Total: 0h 0m 0s</span>
        </div>
        
        <p id="no-data-msg">No activity recorded for this period.</p>
        
        <canvas id="myChart"></canvas>
        <button id="refresh-btn" onclick="refreshCurrentView()">Refresh Data</button>
    </div>

    <script>
        let myChartInstance = null;
        let currentView = 'today';

        function refreshCurrentView() {
            loadChart(currentView);
        }

        function loadDateFromPicker() {
            const dateVal = document.getElementById('date-picker').value;
            if (dateVal) {
                loadChart(`date/${dateVal}`);
            }
        }

        function formatSeconds(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${h}h ${m}m ${s}s`;
        }

        async function loadChart(type = 'today') {
            currentView = type;
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const title = document.getElementById('chart-title');
            const totalDisplay = document.getElementById('total-time-display');
            const noDataMsg = document.getElementById('no-data-msg');
            const chartCanvas = document.getElementById('myChart');
            const datePicker = document.getElementById('date-picker');

            // 1. Logic to keep the Date Picker UI in sync
            if (type === 'today' || type === 'all') {
                datePicker.value = ""; 
            } else if (type.startsWith('date/')) {
                datePicker.value = type.split('/')[1];
            }

            // 2. UI Reset
            noDataMsg.style.display = 'none';
            chartCanvas.style.display = 'block';

            if (type === 'today') title.innerText = "Today's Activity";
            else if (type === 'all') title.innerText = "All-Time History";
            else title.innerText = `Activity for ${type.split('/')[1]}`;

            try {
                const response = await fetch(`http://127.0.0.1:8000/summary/${type}`);
                if (!response.ok) throw new Error('Network error');

                const data = await response.json();
                statusDot.className = 'online';
                statusText.innerText = 'Server Online';

                const labels = Object.keys(data);

                // 3. Handle Empty Data State
                if (labels.length === 0) {
                    noDataMsg.style.display = 'block';
                    chartCanvas.style.display = 'none';
                    totalDisplay.innerText = "Total: 0h 0m 0s";
                    if (myChartInstance) myChartInstance.destroy();
                    return;
                }

                let grandTotalSeconds = 0;
                const values = labels.map(l => {
                    const parts = data[l].match(/\d+/g);
                    if (!parts || parts.length < 3) return 0;
                    const seconds = (parseInt(parts[0]) * 3600) + (parseInt(parts[1]) * 60) + parseInt(parts[2]);
                    grandTotalSeconds += seconds; 
                    return seconds;
                });

                totalDisplay.innerText = `Total: ${formatSeconds(grandTotalSeconds)}`;

                const ctx = chartCanvas.getContext('2d');
                if (myChartInstance) myChartInstance.destroy();

                myChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', '#7BC225'],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const label = context.label || '';
                                        const timeStr = data[label];
                                        return `${label}: ${timeStr}`;
                                    }
                                }
                            }
                        }
                    }
                });

            } catch (e) {
                console.error("Dashboard Error:", e);
                statusDot.className = 'offline';
                statusText.innerText = 'Server Offline';
            }
        }

        loadChart('today');
    </script>
</body>
</html>
